version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    container_name: vulpes-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vulpesdb
      MYSQL_USER: vulpes
      MYSQL_PASSWORD: vulpespassword
    ports:
      - "127.0.0.1:3336:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
