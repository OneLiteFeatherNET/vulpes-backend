micronaut:
  server:
    port: 0

datasources:
  default:
    driverClassName: org.mariadb.jdbc.Driver
    schema-generate: CREATE_DROP
    dialect: MYSQL

jpa:
  default:
    entity-scan:
      packages:
        - net.onelitefeather.vulpes.api.model
    properties:
      hibernate:
        hbm2ddl.auto: update
        dialect: org.hibernate.dialect.MariaDBDialect
