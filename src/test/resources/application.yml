micronaut:
  server:
    port: 0

datasources:
  default:
    driverClassName: org.mariadb.jdbc.Driver
    schema-generate: CREATE_DROP
    dialect: MYSQL
    db-type: mariadb

jpa:
  default:
    entity-scan:
      packages:
        - net.onelitefeather.vulpes.api.model
    properties:
      hibernate:
        hbm2ddl.auto: update
        dialect: org.hibernate.dialect.MariaDBDialect
test-resources:
  containers:
    mariadb:
      image-name: mariadb:11.4