micronaut:
  application:
    name: Vulpes Backend
  server:
    port: ${PORT:8085}
    cors:
      enabled: true
      configurations:
        all:
          allowedOriginsRegex:
            - '^https?://localhost(:\d+)?$'
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
  logger:
    levels:
      io.micronaut.data: DEBUG
      io.micronaut.sql: DEBUG
      io.micronaut.http.server.cors: TRACE
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

# OpenTelemetry — tracing is disabled unless OTEL_TRACES_EXPORTER=otlp is set
# (do this in the Docker/prod container). Metrics stay on Prometheus/Micrometer.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:vulpes-backend}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      protocol: grpc
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:`http://localhost:4317`}
  exclusions:
    - /health
    - /health/.*
    - /prometheus
    - /swagger
    - /swagger/.*
    - /swagger-ui/.*

datasources:
  default:
    url: jdbc:mariadb://localhost:3336/vulpes
    driverClassName: org.mariadb.jdbc.Driver
    username: root
    password: vulpes
    dialect: MYSQL
    schema-generate: CREATE_DROP  # Change to `NONE` or `UPDATE` if you don't want schema recreation
    maximum-pool-size: 10

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl.auto: update  # Use `none` in production
        show_sql: true  # Logs SQL statements
        format_sql: true
